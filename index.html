<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%236c63ff'/><rect x='12' y='14' width='40' height='28' rx='4' fill='white' opacity='.2'/><rect x='16' y='18' width='32' height='6' rx='2' fill='white'/><rect x='16' y='28' width='8' height='5' rx='1.5' fill='white' opacity='.8'/><rect x='28' y='28' width='8' height='5' rx='1.5' fill='white' opacity='.8'/><rect x='40' y='28' width='8' height='5' rx='1.5' fill='white' opacity='.8'/><rect x='16' y='36' width='20' height='5' rx='1.5' fill='white' opacity='.8'/><rect x='18' y='46' width='28' height='4' rx='2' fill='%23a78bfa'/></svg>">
    <title>POS System</title>
    <!-- PDF + canvas libs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Myanmar font for PDF rendering -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      :root{--bg:#0f1117;--surface:#1a1d27;--card:#222535;--border:#2e3148;--accent:#6c63ff;--accent2:#a78bfa;--text:#f0f0f5;--muted:#8b8fa8;--success:#22c55e;--warning:#f59e0b;--danger:#ef4444;--r:10px;--rl:14px;}
      *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
      html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px}
      .shell{display:flex;flex-direction:column;height:100vh;overflow:hidden}
      .main{display:grid;grid-template-columns:1fr 350px;flex:1;overflow:hidden;min-height:0}
      .topbar{display:flex;align-items:center;gap:7px;padding:9px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
      .brand{font-size:15px;font-weight:700;color:var(--accent2)}
      .sp{flex:1}
      .langt{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
      .langb{padding:4px 9px;font-size:11px;cursor:pointer;background:transparent;color:var(--muted);border:none}
      .langb.on{background:var(--accent);color:#fff}
      .nb{padding:5px 11px;border:1px solid var(--border);border-radius:8px;font-size:11px;cursor:pointer;background:transparent;color:var(--muted)}
      .nb:hover{border-color:var(--accent);color:var(--text)}
      .nb.on{background:var(--accent);color:#fff;border-color:var(--accent)}
      .uchip{display:flex;align-items:center;gap:5px;padding:4px 10px;border:1px solid var(--border);border-radius:20px;font-size:11px;cursor:pointer;color:var(--muted)}
      .uchip:hover{border-color:var(--accent);color:var(--text)}
      .udot{width:7px;height:7px;border-radius:50%;background:var(--success);flex-shrink:0}
      .lcol{display:flex;flex-direction:column;overflow:hidden;height:100%}
      .lfilters{flex-shrink:0;padding:8px 12px 5px}
      .swrap{position:relative;margin-bottom:7px}
      .sbar{width:100%;padding:7px 11px 7px 32px;border:1px solid var(--border);border-radius:var(--r);font-size:12px;background:var(--surface);color:var(--text);outline:none}
      .sbar:focus{border-color:var(--accent)}
      .sbar::placeholder{color:var(--muted)}
      .sico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
      .catrow{display:flex;gap:5px;flex-wrap:wrap}
      .catb{padding:4px 10px;border:1px solid var(--border);border-radius:20px;font-size:11px;cursor:pointer;background:transparent;color:var(--muted)}
      .catb:hover{border-color:var(--accent);color:var(--text)}
      .catb.on{background:var(--accent);color:#fff;border-color:var(--accent)}
      .pgrid-wrap{flex:1;overflow:hidden;padding:5px 12px 6px}
      .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:7px;align-content:start}
      .pcard{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:9px 10px;cursor:pointer;transition:border-color .15s,transform .1s}
      .pcard:hover{border-color:var(--accent)}
      .pcard:active{transform:scale(.96)}
      .pcard.gone{opacity:.35;cursor:not-allowed}
      .pname{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px;line-height:1.3}
      .pprice{font-size:13px;font-weight:700;color:var(--accent2)}
      .pstock{font-size:10px;color:var(--muted);margin-top:2px}
      .pstock.lo{color:var(--warning)}
      .pstock.no{color:var(--danger)}
      .psize-hint{font-size:10px;color:var(--accent);margin-top:2px}
      .rcol{display:flex;flex-direction:column;background:var(--surface);border-left:1px solid var(--border);height:100%;overflow:hidden}
      .ch{padding:9px 13px 7px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
      .ctitle{font-size:13px;font-weight:600}
      .clrbtn{font-size:11px;padding:3px 8px;border:1px solid var(--border);border-radius:6px;cursor:pointer;background:transparent;color:var(--muted)}
      .clrbtn:hover{border-color:var(--danger);color:var(--danger)}
      .clist{flex-shrink:0;max-height:120px;overflow-y:auto;padding:3px 13px}
      .clist::-webkit-scrollbar{width:2px}
      .clist::-webkit-scrollbar-thumb{background:var(--border)}
      .cempty{display:flex;align-items:center;justify-content:center;padding:12px 0;color:var(--muted);font-size:12px;gap:7px;opacity:.5}
      .citem{display:flex;align-items:center;gap:5px;padding:5px 0;border-bottom:1px solid var(--border)}
      .ciname{flex:1;font-size:11px;color:var(--text);line-height:1.3}
      .ciprice{font-size:11px;color:var(--muted);min-width:58px;text-align:right}
      .qctrl{display:flex;align-items:center;gap:2px;flex-shrink:0}
      .qbtn{width:20px;height:20px;border:1px solid var(--border);border-radius:5px;background:var(--card);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--text)}
      .qbtn:hover{border-color:var(--accent);color:var(--accent)}
      .qnum{font-size:11px;min-width:16px;text-align:center;font-weight:600}
      .csummary{flex-shrink:0;padding:7px 13px 5px;border-top:1px solid var(--border)}
      .srow{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px}
      .stotal{display:flex;justify-content:space-between;font-size:15px;font-weight:700;margin-top:2px}
      .stotal .tv{color:var(--accent2)}
      .ccash{flex-shrink:0;padding:6px 13px 5px;border-top:1px solid var(--border)}
      .cash-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
      .cash-display{font-size:20px;font-weight:800;text-align:right;padding:6px 11px;background:var(--card);border:2px solid var(--accent);border-radius:var(--r);margin-bottom:6px;color:var(--accent2);letter-spacing:1px}
      .quick-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:6px}
      .qkbtn{padding:6px 2px;border:1px solid var(--border);border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;background:var(--card);color:var(--accent2);text-align:center}
      .qkbtn:hover{border-color:var(--accent);background:rgba(108,99,255,.1)}
      .qkbtn:active{transform:scale(.93)}
      .cnumpad{flex-shrink:0;padding:0 13px 5px}
      .numpad-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
      .np-btn{padding:10px 4px;border:1px solid var(--border);border-radius:var(--r);font-size:18px;font-weight:700;cursor:pointer;background:var(--card);color:var(--text);text-align:center;user-select:none;-webkit-user-select:none}
      .np-btn:hover{background:rgba(108,99,255,.08);border-color:var(--accent)}
      .np-btn:active{transform:scale(.91);background:var(--border)}
      .np-del{color:var(--danger);font-size:15px}
      .np-triple{font-size:13px;color:var(--muted)}
      .cbottom{flex-shrink:0;padding:6px 13px 6px;border-top:1px solid var(--border);background:var(--surface)}
      .change-box{border-radius:10px;padding:7px 12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
      .change-box.ok{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3)}
      .change-box.short{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3)}
      .change-box.zero,.change-box.empty{background:var(--card);border:1px solid var(--border)}
      .change-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
      .change-lbl.ok{color:var(--success)}
      .change-lbl.short{color:var(--danger)}
      .change-lbl.zero,.change-lbl.empty{color:var(--muted)}
      .change-amt{font-size:17px;font-weight:800}
      .change-amt.ok{color:var(--success)}
      .change-amt.short{color:var(--danger)}
      .change-amt.zero,.change-amt.empty{color:var(--muted)}
      .pay-btn{width:100%;padding:12px;border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;background:var(--accent);color:#fff}
      .pay-btn:hover{background:#7c75ff}
      .pay-btn:active{transform:scale(.98)}
      .pay-btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}
      .pos-footer{text-align:center;font-size:10px;color:var(--muted);margin-top:5px}
      .pos-footer b{color:var(--accent2)}
      .fullcol{display:flex;flex-direction:column;overflow:hidden;grid-column:1/-1}
      .scroll{flex:1;overflow-y:auto;padding:14px;min-height:0}
      .scroll::-webkit-scrollbar{width:4px}
      .scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
      .dtable{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
      .dtable th{text-align:left;padding:8px 10px;font-size:10px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.5px}
      .dtable td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
      .dtable tr:hover td{background:rgba(108,99,255,.04)}
      .dtable tr:last-child td{border-bottom:none}
      .badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600}
      .bok{background:rgba(34,197,94,.15);color:var(--success)}
      .blow{background:rgba(245,158,11,.15);color:var(--warning)}
      .bout{background:rgba(239,68,68,.15);color:var(--danger)}
      .badm{background:rgba(108,99,255,.2);color:var(--accent2)}
      .bcas{background:rgba(139,143,168,.15);color:var(--muted)}
      .mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px}
      .mcard{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:12px}
      .mlbl{font-size:10px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
      .mval{font-size:20px;font-weight:700}
      .mval.ac{color:var(--accent2)}
      .sechd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
      .sectit{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}
      .scard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px;margin-bottom:7px}
      .stop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;gap:8px}
      .smeta{font-size:10px;color:var(--muted);line-height:1.6}
      .samt{font-size:13px;font-weight:700;color:var(--accent2);white-space:nowrap}
      .sitems{font-size:11px;color:var(--muted);line-height:1.5}
      .frow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:var(--r)}
      .flbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
      .dinput{padding:6px 9px;border:1px solid var(--border);border-radius:8px;font-size:12px;background:var(--surface);color:var(--text);outline:none}
      .dinput:focus{border-color:var(--accent)}
      input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.6)}
      .dlrow{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
      .dlbtn{display:flex;align-items:center;gap:5px;padding:8px 14px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;border:1px solid}
      .dlbtn:active{transform:scale(.97)}
      .dlcsv{background:rgba(34,197,94,.1);color:var(--success);border-color:rgba(34,197,94,.3)}
      .dlcsv:hover{background:rgba(34,197,94,.2)}
      .dlpdf{background:rgba(239,68,68,.1);color:var(--danger);border-color:rgba(239,68,68,.3)}
      .dlpdf:hover{background:rgba(239,68,68,.2)}
      .btn{padding:7px 13px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text)}
      .btn:hover{border-color:var(--accent);color:var(--accent)}
      .btnpr{background:var(--accent);color:#fff;border-color:var(--accent)}
      .btnpr:hover{background:#7c75ff}
      .btndg{background:rgba(239,68,68,.15);color:var(--danger);border-color:rgba(239,68,68,.4)}
      .btndg:hover{background:rgba(239,68,68,.25)}
      .addbtn{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;background:var(--accent);color:#fff;border:none}
      .addbtn:hover{background:#7c75ff}
      .addbtn:active{transform:scale(.97)}
      .overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
      .mbox{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:22px;width:340px;max-width:94vw;max-height:90vh;overflow-y:auto}
      .mbox h3{font-size:15px;font-weight:700;margin-bottom:16px}
      .mbtns{display:flex;gap:7px;margin-top:16px;flex-wrap:wrap}
      .field{margin-bottom:12px}
      .field label{display:block;font-size:10px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px;font-weight:600}
      .field input,.field select{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;background:var(--card);color:var(--text);outline:none}
      .field input:focus,.field select:focus{border-color:var(--accent)}
      .field input::placeholder{color:var(--muted)}
      .field select option{background:var(--surface)}
      .size-picker-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
      .size-picker-sub{font-size:11px;color:var(--muted);margin-bottom:14px}
      .size-btns{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-bottom:4px}
      .size-btn{padding:12px 8px;border:1.5px solid var(--border);border-radius:var(--rl);cursor:pointer;background:var(--card);text-align:center;transition:all .15s}
      .size-btn:hover{border-color:var(--accent);background:rgba(108,99,255,.1)}
      .size-btn:active{transform:scale(.95)}
      .size-btn-label{font-size:16px;font-weight:700;color:var(--text);display:block}
      .size-btn-price{font-size:12px;color:var(--accent2);margin-top:2px;display:block}
      .size-row{display:flex;gap:6px;align-items:center;margin-bottom:7px}
      .size-row input{flex:1;padding:7px 9px;border:1px solid var(--border);border-radius:var(--r);font-size:12px;background:var(--card);color:var(--text);outline:none}
      .size-row input:focus{border-color:var(--accent)}
      .size-del{padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--danger);cursor:pointer;font-size:13px;flex-shrink:0}
      .size-add-btn{font-size:11px;padding:5px 10px;border:1px dashed var(--border);border-radius:7px;background:transparent;color:var(--muted);cursor:pointer;margin-top:4px}
      .size-add-btn:hover{border-color:var(--accent);color:var(--accent)}
      .has-sizes-toggle{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:12px;color:var(--muted);cursor:pointer}
      .toggle-box{width:36px;height:20px;border-radius:10px;border:1px solid var(--border);background:var(--card);position:relative;transition:background .2s;flex-shrink:0}
      .toggle-box.on{background:var(--accent);border-color:var(--accent)}
      .toggle-knob{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:var(--muted);transition:left .2s,background .2s}
      .toggle-box.on .toggle-knob{left:18px;background:#fff}
      .sucmod{text-align:center;padding:8px 0}
      .sucico{font-size:48px;display:block;margin-bottom:10px}
      .sucamt{font-size:26px;font-weight:800;color:var(--accent2);margin-bottom:3px}
      .sucsub{font-size:12px;color:var(--muted);margin-bottom:3px}
      .suc-change-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
      .suc-change{font-size:24px;font-weight:800;color:var(--success);margin-bottom:18px}
      .loginsc{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);padding:20px}
      .loginlogo{font-size:24px;font-weight:800;color:var(--accent2);margin-bottom:4px}
      .loginsub{font-size:13px;color:var(--muted);margin-bottom:24px}
      .logincard{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:26px;width:100%;max-width:300px}
      .slist{display:flex;flex-direction:column;gap:8px}
      .sitem{display:flex;align-items:center;gap:12px;padding:11px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer}
      .sitem:hover{border-color:var(--accent);background:rgba(108,99,255,.07)}
      .sitem:active{transform:scale(.98)}
      .savatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
      .sname{font-size:13px;font-weight:600}
      .srole{font-size:11px;color:var(--muted)}
      .pingrid{display:flex;gap:10px;margin-top:14px;justify-content:center}
      .pindot{width:46px;height:46px;border:2px solid var(--border);border-radius:10px;font-size:20px;text-align:center;background:var(--card);color:var(--text);outline:none}
      .pindot:focus{border-color:var(--accent)}
      .pinerr{color:var(--danger);font-size:12px;margin-top:10px;text-align:center;min-height:18px}
      .backbtn{font-size:12px;color:var(--muted);cursor:pointer;margin-bottom:12px;background:none;border:none;display:flex;align-items:center;gap:4px}
      .backbtn:hover{color:var(--text)}
      .staffgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
      .staffcard{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:12px;display:flex;align-items:center;gap:10px}
      .scavatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
      .scinfo{flex:1;min-width:0}
      .scname{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      .scedit{padding:5px 10px;border:1px solid var(--border);border-radius:7px;font-size:11px;cursor:pointer;background:transparent;color:var(--muted);flex-shrink:0}
      .scedit:hover{border-color:var(--accent);color:var(--accent)}
      .footer{padding:7px 16px;background:var(--surface);border-top:1px solid var(--border);text-align:center;font-size:10px;color:var(--muted);flex-shrink:0}
      .footer b{color:var(--accent2)}
      /* PDF generating overlay */
      .pdf-loading{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px}
      .pdf-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
      .pdf-loading-text{font-size:14px;color:var(--text)}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
const DBN='pos_v8',DBV=1;let db;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DBN,DBV);r.onupgradeneeded=e=>{const d=e.target.result;['products','sales','staff'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:'id',autoIncrement:true});});};r.onsuccess=e=>{db=e.target.result;res();};r.onerror=rej;});}
const dbAll=s=>new Promise(r=>{db.transaction(s,'readonly').objectStore(s).getAll().onsuccess=e=>r(e.target.result);});
const dbPut=(s,v)=>new Promise(r=>{db.transaction(s,'readwrite').objectStore(s).put(v).onsuccess=e=>r(e.target.result);});
const dbDel=(s,id)=>new Promise(r=>{db.transaction(s,'readwrite').objectStore(s).delete(id).onsuccess=()=>r();});
const dbAdd=(s,v)=>new Promise(r=>{db.transaction(s,'readwrite').objectStore(s).add(v).onsuccess=e=>r(e.target.result);});

const S={products:[],sales:[],staff:[],cart:[],search:'',cat:'All',cashReceived:0,user:null,lstep:'select',lstaff:null,lpin:'',view:'pos',modal:null,from:'',to:''};

  S.products=await dbAll('products');
  if(!S.products.length){
    const items=[
      {name:'Americano',price:1500,stock:99,category:'Drinks',sizes:[{label:'S',price:1500},{label:'M',price:2000},{label:'L',price:2500}]},
      {name:'Latte',price:2000,stock:99,category:'Drinks',sizes:[{label:'S',price:2000},{label:'M',price:2500},{label:'L',price:3000}]},
      {name:'Matcha Latte',price:2500,stock:50,category:'Drinks',sizes:[{label:'S',price:2500},{label:'M',price:3000},{label:'L',price:3500}]},
      {name:'Orange Juice',price:1800,stock:30,category:'Drinks',sizes:[]},
      {name:'Croissant',price:1500,stock:20,category:'Food',sizes:[]},
      {name:'Toast Set',price:2000,stock:15,category:'Food',sizes:[]},
      {name:'Cheesecake',price:3000,stock:10,category:'Food',sizes:[{label:'Slice',price:3000},{label:'Whole',price:18000}]},
      {name:'Banana Muffin',price:1200,stock:5,category:'Food',sizes:[]},
      {name:'Water',price:500,stock:99,category:'Drinks',sizes:[]},
      {name:'Pad Thai',price:3500,stock:20,category:'Food',sizes:[{label:'S',price:3500},{label:'L',price:5000}]},
    ];
    for(const i of items)await dbAdd('products',i);
    S.products=await dbAll('products');
  }
  S.staff=await dbAll('staff');
  if(!S.staff.length){
    await dbAdd('staff',{name:'Admin',role:'admin',pin:'1234',initials:'AD'});
    await dbAdd('staff',{name:'Cashier 1',role:'cashier',pin:'1111',initials:'C1'});
    S.staff=await dbAll('staff');
  }

function cats(){return['All',...new Set(S.products.map(p=>p.category))].sort((a,b)=>a==='All'?-1:b==='All'?1:a.localeCompare(b));}
function fprods(){return S.products.filter(p=>(S.cat==='All'||p.category===S.cat)&&p.name.toLowerCase().includes(S.search.toLowerCase()));}
function cartTotal(){return S.cart.reduce((a,i)=>a+i.price*i.qty,0);}
function fsales(){return S.sales.filter(s=>{const d=new Date(s.time);if(S.from){const f=new Date(S.from);f.setHours(0,0,0,0);if(d<f)return false;}if(S.to){const f=new Date(S.to);f.setHours(23,59,59,999);if(d>f)return false;}return true;});}
function quickAmounts(total){const a=new Set();[1000,2000,5000,10000,20000,50000].forEach(u=>{const v=Math.ceil(total/u)*u;if(v>=total)a.add(v);});a.add(total);return[...a].filter(x=>x>=total).sort((a,b)=>a-b).slice(0,3);}

function tryAddToCart(p){if(p.sizes&&p.sizes.length>0){S.modal={type:'sizePick',product:p};render();return;}addToCart(p.name,p.price,p.id);}
function addToCart(name,price,prodId){const key=name+'__'+price;const ex=S.cart.find(i=>i.key===key);const p=S.products.find(x=>x.id===prodId);if(p&&p.stock<=0)return;if(ex){ex.qty++;}else S.cart.push({key,name,price,prodId,qty:1});S.modal=null;render();}
function chqty(key,d){const i=S.cart.find(x=>x.key===key);if(!i)return;i.qty+=d;if(i.qty<=0)S.cart=S.cart.filter(x=>x.key!==key);render();}
async function checkout(){
  if(!S.cart.length)return;
  const total=cartTotal();const change=S.cashReceived-total;if(change<0)return;
  const sale={items:S.cart.map(i=>({name:i.name,price:i.price,qty:i.qty,prodId:i.prodId})),total,cashReceived:S.cashReceived,change,method:'Cash',time:new Date().toISOString(),staffId:S.user?.id,staffName:S.user?.name};
  await dbAdd('sales',sale);
  const deduct={};S.cart.forEach(i=>{deduct[i.prodId]=(deduct[i.prodId]||0)+i.qty;});
  for(const [id,qty] of Object.entries(deduct)){const p=S.products.find(x=>x.id===parseInt(id));if(p){p.stock=Math.max(0,p.stock-qty);await dbPut('products',p);}}
  S.sales=await dbAll('sales');S.modal={type:'ok',sale};S.cart=[];S.cashReceived=0;render();
}

function doCSV(){
  const rows=[['ID','Date','Time','Staff','Product','Qty','Unit Price','Line Total','Sale Total','Cash Received','Change']];
  fsales().forEach(s=>{const d=new Date(s.time);s.items.forEach((i,idx)=>rows.push(idx===0?[s.id,d.toLocaleDateString(),d.toLocaleTimeString(),s.staffName||'—',i.name,i.qty,i.price,i.price*i.qty,s.total,s.cashReceived,s.change]:['','','','',i.name,i.qty,i.price,i.price*i.qty,'','','']));});
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));a.download='pos_report.csv';a.click();
}

// ── PDF: uses html2canvas so Burmese text renders correctly ──────
async function doPDF(){
  const sales=fsales();
  const tdstr=new Date().toDateString();
  const ts=S.sales.filter(s=>new Date(s.time).toDateString()===tdstr);
  const period=S.from&&S.to?S.from+' → '+S.to:S.from?'From '+S.from:S.to?'To '+S.to:'All time';
  const pm={};sales.forEach(s=>s.items.forEach(i=>{if(!pm[i.name])pm[i.name]={q:0,r:0};pm[i.name].q+=i.qty;pm[i.name].r+=i.price*i.qty;}));

  // Show loading overlay
  const loadDiv=document.createElement('div');
  loadDiv.className='pdf-loading';
  loadDiv.innerHTML='<div class="pdf-spinner"></div><div class="pdf-loading-text">Generating PDF…</div>';
  document.body.appendChild(loadDiv);

  // Build report HTML (white, clean, Burmese-friendly font)
  const wrap=document.createElement('div');
  wrap.style.cssText='position:fixed;top:-99999px;left:-99999px;width:794px;background:#fff;color:#1a1d2e;font-family:"Noto Sans Myanmar",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:13px;line-height:1.6;';

  const metricCards=[
    ["Today's Revenue / ယနေ့ဝင်ငွေ",ks(ts.reduce((a,s)=>a+s.total,0))],
    ["Today's Orders / ယနေ့အော်ဒါ",String(ts.length)],
    ["Period Revenue / ကာလဝင်ငွေ",ks(sales.reduce((a,s)=>a+s.total,0))],
    ["Period Orders / ကာလအော်ဒါ",String(sales.length)]
  ].map(([l,v])=>`<div style="background:#f5f3ff;border:1px solid #e0dcff;border-radius:10px;padding:14px 16px;"><div style="font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;">${l}</div><div style="font-size:20px;font-weight:800;color:#6c63ff;">${v}</div></div>`).join('');

  const prodRows=Object.entries(pm).sort((a,b)=>b[1].r-a[1].r).map(([n,d],i)=>`<tr style="background:${i%2===0?'#fff':'#faf9ff'};"><td style="padding:9px 14px;border-bottom:1px solid #eee;">${n}</td><td style="padding:9px 14px;text-align:center;border-bottom:1px solid #eee;">${d.q}</td><td style="padding:9px 14px;text-align:right;border-bottom:1px solid #eee;font-weight:700;color:#6c63ff;">${ks(d.r)}</td></tr>`).join('')||`<tr><td colspan="3" style="padding:16px;text-align:center;color:#aaa;">No sales in this period</td></tr>`;

  const saleRows=[...sales].reverse().map((s,i)=>{
    const d=new Date(s.time);
    const itemStr=s.items.map(x=>x.name+' ×'+x.qty).join(', ');
    return`<tr style="background:${i%2===0?'#fff':'#faf9ff'};"><td style="padding:8px 10px;border-bottom:1px solid #eee;color:#888;font-size:11px;">#${s.id}</td><td style="padding:8px 10px;border-bottom:1px solid #eee;font-size:11px;">${d.toLocaleDateString()}<br><span style="color:#aaa">${d.toLocaleTimeString().slice(0,5)}</span></td><td style="padding:8px 10px;border-bottom:1px solid #eee;font-size:11px;">${s.staffName||'—'}</td><td style="padding:8px 10px;border-bottom:1px solid #eee;font-size:11px;">${itemStr}</td><td style="padding:8px 10px;border-bottom:1px solid #eee;text-align:right;font-weight:700;color:#6c63ff;">${ks(s.total)}</td><td style="padding:8px 10px;border-bottom:1px solid #eee;text-align:right;font-size:11px;">${ks(s.cashReceived)}</td><td style="padding:8px 10px;border-bottom:1px solid #eee;text-align:right;font-size:11px;color:#22c55e;font-weight:600;">${ks(s.change||0)}</td></tr>`;
  }).join('')||`<tr><td colspan="7" style="padding:16px;text-align:center;color:#aaa;">No sales</td></tr>`;

  wrap.innerHTML=`<div style="padding:44px 50px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px;padding-bottom:22px;border-bottom:3px solid #6c63ff;">
      <div>
        <div style="font-size:28px;font-weight:800;color:#6c63ff;margin-bottom:5px;">📊 Sales Report</div>
        <div style="font-size:12px;color:#777;">Generated: ${new Date().toLocaleString()}</div>
      </div>
      <div style="text-align:right;font-size:12px;color:#777;line-height:1.8;">
        <div><b>Period:</b> ${period}</div>
        ${S.user?`<div><b>By:</b> ${S.user.name}</div>`:''}
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:34px;">${metricCards}</div>

    <div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #f0f0f0;">Product Breakdown / ကုန်ပစ္စည်းအနှစ်ချုပ်</div>
    <table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:32px;">
      <thead><tr style="background:#6c63ff;color:#fff;"><th style="padding:10px 14px;text-align:left;border-radius:6px 0 0 0;font-weight:600;">Product / ကုန်ပစ္စည်း</th><th style="padding:10px 14px;text-align:center;font-weight:600;">Qty / အရေအတွက်</th><th style="padding:10px 14px;text-align:right;border-radius:0 6px 0 0;font-weight:600;">Revenue / ဝင်ငွေ</th></tr></thead>
      <tbody>${prodRows}</tbody>
    </table>

    <div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #f0f0f0;">Sales Log / ရောင်းချမှုမှတ်တမ်း</div>
    <table style="width:100%;border-collapse:collapse;font-size:12px;">
      <thead><tr style="background:#6c63ff;color:#fff;"><th style="padding:8px 10px;text-align:left;font-weight:600;">#</th><th style="padding:8px 10px;text-align:left;font-weight:600;">Date/Time</th><th style="padding:8px 10px;text-align:left;font-weight:600;">Staff</th><th style="padding:8px 10px;text-align:left;font-weight:600;">Items</th><th style="padding:8px 10px;text-align:right;font-weight:600;">Total</th><th style="padding:8px 10px;text-align:right;font-weight:600;">Received</th><th style="padding:8px 10px;text-align:right;font-weight:600;">Change</th></tr></thead>
      <tbody>${saleRows}</tbody>
    </table>

    <div style="margin-top:32px;padding-top:16px;border-top:1px solid #eee;display:flex;justify-content:space-between;font-size:11px;color:#aaa;">
      <span>POS System — Developed by <b style="color:#6c63ff">Akihiro</b></span>
      <span>${new Date().toLocaleDateString()}</span>
    </div>
  </div>`;

  document.body.appendChild(wrap);

  try{
    await document.fonts.ready;
    const canvas=await html2canvas(wrap,{scale:2,useCORS:true,backgroundColor:'#ffffff',logging:false});
    document.body.removeChild(wrap);
    document.body.removeChild(loadDiv);

    const{jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pageW=pdf.internal.pageSize.getWidth();
    const pageH=pdf.internal.pageSize.getHeight();
    const imgW=pageW;
    const imgH=(canvas.height/canvas.width)*imgW;
    const imgData=canvas.toDataURL('image/jpeg',0.92);

    let heightLeft=imgH;let pos=0;
    pdf.addImage(imgData,'JPEG',0,pos,imgW,imgH);
    heightLeft-=pageH;
    while(heightLeft>0){pos-=pageH;pdf.addPage();pdf.addImage(imgData,'JPEG',0,pos,imgW,imgH);heightLeft-=pageH;}
    pdf.save('pos_report.pdf');
  }catch(err){
    if(document.body.contains(wrap))document.body.removeChild(wrap);
    if(document.body.contains(loadDiv))document.body.removeChild(loadDiv);
    console.error('PDF error:',err);
    alert('PDF generation failed: '+err.message);
  }
}

function h(tag,props,children){const e=document.createElement(tag);if(props){Object.keys(props).forEach(k=>{if(k==='cls')e.className=props[k];else if(k==='style')e.style.cssText=props[k];else if(k.startsWith('on'))e[k]=props[k];else e.setAttribute(k,props[k]);});}if(children!=null){(Array.isArray(children)?children:[children]).forEach(c=>{if(c==null)return;e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);});}return e;}
function div(cls,children,style){return h('div',style?{cls,style}:{cls},children);}
function btn(cls,label,onclick){return h('button',{cls,onclick},label);}
function span(cls,label){return h('span',{cls},label);}
function inp(props){return h('input',props);}

function renderLogin(){
  const wrap=div('loginsc');wrap.appendChild(div('loginlogo',t('app')));wrap.appendChild(div('loginsub','Point of Sale'));
  const card=div('logincard');const lt=div('langt',null,'margin-bottom:16px');['en','my'].forEach(l=>{lt.appendChild(btn('langb'+(lang===l?' on':''),l==='en'?'EN':'မြန်မာ',()=>{lang=l;render();}));});card.appendChild(lt);
